server {
    listen 80;
    server_name localhost;
    
    # Configurações de segurança básicas
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    
    # Configuração da raiz do site
    root /usr/share/nginx/html/reserva;
    index index.html;
    
    # Cache para recursos estáticos - deve vir ANTES da location /
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Configuração para arquivos HTML
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }
    
    # Configuração principal - deve vir por ÚLTIMO
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Logs
    access_log /var/log/nginx/reserva_access.log;
    error_log /var/log/nginx/reserva_error.log;
    
    # Configurações para melhor performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
    
    # Configuração para suporte a CORS (caso necessário para Firebase)
    location ~* \.(woff|woff2|ttf|eot)$ {
        add_header Access-Control-Allow-Origin "*";
        expires 1y;
    }
}